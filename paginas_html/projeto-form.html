<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Novo Projeto | ProjectManager</title>

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/forms.css">
    <link rel="stylesheet" href="/css/tables.css">

    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
    
</head>

<body>
    <script src="/js/script.js"></script>

    <div class="wrapper">

        <aside class="sidebar">

            <div class="logo">
                ProjectManager
            </div>

            <ul>

                <li id="menuDashboard">
                    <a href="dashboard.html">🏠 Dashboard</a>
                </li>

                <li id="menuProjetos">
                    <a href="projetos.html">📁 Projetos</a>
                </li>

                <li id="menuTarefas">
                    <a href="tarefas.html">✅ Tarefas</a>
                </li>

                <li id="menuUsuarios">
                    <a href="usuarios.html">👥 Usuários</a>
                </li>

                <li id="menuNotificacoes">
                    <a href="notificacoes.html">🔔 Notificações</a>
                </li>

                <li>
                    <a href="index.html">🚪 Sair</a>
                </li>

            </ul>

        </aside>

        <main class="content">

            <div class="header">

                <h2>Cadastro de Projeto</h2>

            </div>

            <div class="form">

                <div class="grid-2">

                    <div class="form-group">

                        <label>Nome do Projeto</label>

                        <input type="text" placeholder="Digite o nome do projeto">

                    </div>

                    <div class="form-group">

                        <label>Gerente Responsável</label>

                        <select>

                            <option>Renan Lima</option>
                            <option>Ana Souza</option>
                            <option>Carlos Oliveira</option>

                        </select>

                    </div>

                    <div class="form-group">

                        <label>Data de Início</label>

                        <input type="date">

                    </div>

                    <div class="form-group">

                        <label>Data Final</label>

                        <input type="date">

                    </div>

                </div>

                <div class="form-group">

                    <label>Descrição</label>

                    <textarea placeholder="Descrição do projeto"></textarea>

                </div>

                <div class="grid-2">

                    <button class="btn btn-blue">

                        Salvar Projeto

                    </button>

                    <button class="btn btn-red" onclick="history.back()">

                        Cancelar

                    </button>

                </div>

            </div>

        </main>

    </div>

</body>

</html>
